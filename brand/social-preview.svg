<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="circle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#2a1d06"/>
      <stop offset="70%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117"/>
  <rect width="1280" height="640" fill="url(#bg-glow)"/>

  <!-- Concentric region rings -->
  <circle cx="640" cy="232" r="160" fill="none" stroke="#e8a33d" stroke-width="1" opacity="0.10" filter="url(#circle-glow)"/>
  <circle cx="640" cy="232" r="140" fill="none" stroke="#e8a33d" stroke-width="0.8" opacity="0.08"/>
  <!-- Main region (L1) -->
  <circle cx="640" cy="232" r="118" fill="none" stroke="#e8a33d" stroke-width="3" opacity="0.9" filter="url(#circle-glow)"/>

  <!-- Affine companion (at-most-once): dashed copper, may be dropped — fades before exit -->
  <path d="M 360,268 L 520,268 Q 600,268 640,250"
        fill="none" stroke="#c47e3a" stroke-width="3.5" stroke-linecap="round"
        stroke-dasharray="2 16" opacity="0.7" filter="url(#glow)"/>

  <!-- Linear thread (exactly once): one unbroken stroke, enters → through region → exits once -->
  <path d="M 360,212 L 540,212 Q 600,212 640,232 Q 680,252 740,212 L 920,212"
        fill="none" stroke="#e8a33d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
  <circle cx="360" cy="212" r="6" fill="#e8a33d" filter="url(#glow)"/>
  <path d="M 920,212 l -16,-10 l 0,20 z" fill="#e8a33d" filter="url(#glow)"/>
  <circle cx="640" cy="232" r="4" fill="#e8a33d" opacity="0.55"/>

  <!-- Wordmark -->
  <text x="640" y="470" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="104" font-weight="300" fill="#e6edf3" letter-spacing="3" filter="url(#text-glow)">ephapax</text>
  <!-- Etymology subtitle (the symbolism: 'once, for all') -->
  <text x="640" y="524" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="300" fill="#e8a33d" letter-spacing="6" opacity="0.85">ἐφάπαξ · used exactly once</text>

  <!-- Accent rule -->
  <line x1="500" y1="556" x2="610" y2="556" stroke="#e8a33d" stroke-width="1" opacity="0.3"/>
  <circle cx="640" cy="556" r="4" fill="#e8a33d" opacity="0.6"/>
  <line x1="670" y1="556" x2="780" y2="556" stroke="#e8a33d" stroke-width="1" opacity="0.3"/>
</svg>
