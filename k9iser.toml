#
# k9iser manifest for ephapax
# Formal verification library with linear type proofs

[project]
name = "ephapax"
safety_tier = "hunt"

[[source]]
path = "Cargo.toml"
type = "cargo"
output = "generated/k9iser/cargo-manifest.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"
