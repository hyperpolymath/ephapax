<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="circle-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg-glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#2a1d06"/>
      <stop offset="70%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>
  <rect width="512" height="512" rx="96" fill="url(#bg-glow)"/>

  <!-- Region (L1 capability): the circle the resource lives in -->
  <circle cx="256" cy="248" r="150" fill="none" stroke="#e8a33d" stroke-width="6" opacity="0.20"/>
  <circle cx="256" cy="248" r="128" fill="none" stroke="#e8a33d" stroke-width="8" opacity="0.9" filter="url(#circle-glow)"/>

  <!-- Affine companion (at-most-once): dashed copper, may be dropped — it fades out before exit -->
  <path d="M 96,288 L 180,288 Q 230,288 256,272"
        fill="none" stroke="#c47e3a" stroke-width="7" stroke-linecap="round"
        stroke-dasharray="2 18" opacity="0.75" filter="url(#glow)"/>

  <!-- Linear thread (exactly once): one unbroken amber stroke entering, through the region, exiting once -->
  <path d="M 96,224 L 188,224 Q 230,224 256,248 Q 282,272 324,224 L 392,224"
        fill="none" stroke="#e8a33d" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Entry node: the resource introduced -->
  <circle cx="96" cy="224" r="11" fill="#e8a33d" filter="url(#glow)"/>
  <!-- Exit arrowhead: consumed exactly once, leaves the region -->
  <path d="M 392,224 l -20,-13 l 0,26 z" fill="#e8a33d" filter="url(#glow)"/>

  <!-- Echo residue tick (L3): a faint mark of what was spent -->
  <circle cx="256" cy="248" r="6" fill="#e8a33d" opacity="0.55"/>
</svg>
